# ── Instagram accounts to monitor ────────────────
# Instagram blocks unauthenticated scraping — leave empty.
instagram_accounts: []

# ── Search queries for DuckDuckGo discovery ───────
search_queries:
  - "EE CS competition Malaysia 2026"
  - "engineering hackathon Malaysia 2026"
  - "tech career fair Malaysia 2026"
  - "university Malaysia engineering workshop 2026"
  - "IEEE Malaysia conference 2026"
  - "computer science competition Malaysia students 2026"
  - "electrical engineering event Malaysia 2026"
  - "coding competition Malaysia open 2026"
  - "robotics competition Malaysia 2026"
  - "cybersecurity CTF Malaysia 2026"

# ── Scheduler settings ────────────────────────────
scheduler:
  run_time: "08:00"         # daily run at 8am local time
  timezone: "Asia/Kuala_Lumpur"
  retry_on_failure: true
  max_retries: 3

# ── Dashboard settings ────────────────────────────
dashboard:
  title: "EE & CS Event Tracker"
  default_filter_months: 6
  show_past_events: false

# ── Email digest (optional) ───────────────────────
# Set enabled: true and fill in credentials to receive a daily email
# when new events are found. For Gmail use an App Password (not your
# main password): https://myaccount.google.com/apppasswords
email:
  enabled: false
  smtp_host: smtp.gmail.com
  smtp_port: 587
  username: ""       # your Gmail address
  password: ""       # Gmail App Password
  to: ""             # recipient (leave blank to send to yourself)
