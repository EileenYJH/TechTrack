# Keywords used to detect relevant events across all sources
keywords:
  - competition
  - hackathon
  - workshop
  - bootcamp
  - career fair
  - conference
  - symposium
  - seminar
  - internship fair
  - tech talk
  - recruitment
  - coding challenge
  - robotics
  - embedded systems
  - circuit design
  - machine learning
  - AI
  - cybersecurity
  - datathon
  - company visit
  - industry visit
  - open day

# Categories for classification
categories:
  - Competition
  - Career Fair
  - Conference
  - Workshop / Bootcamp
  - Seminar / Talk
  - Company Visit
  - Hackathon
  - Other

